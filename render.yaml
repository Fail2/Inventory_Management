services:
  - type: web
    name: inventory-hub
    env: python
    region: oregon
    plan: free
    branch: main
    rootDir: inventory_management
    buildCommand: >
      pip install -r ../requirements.txt &&
      python manage.py collectstatic --noinput &&
      python manage.py migrate &&
      python manage.py ensure_admin
    startCommand: gunicorn inventory_management.wsgi --bind 0.0.0.0:$PORT --log-file -
    envVars:
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: "inventory-hub.onrender.com"
      - key: DJANGO_SECRET_KEY
        sync: false
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DJANGO_SUPERUSER_USERNAME
        sync: false
      - key: DJANGO_SUPERUSER_EMAIL
        sync: false
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false
      # Points at a Neon Postgres database instead of a Render-managed one -
      # Render's own free Postgres was timing out on external connections,
      # blocking createsuperuser from outside Render's network. Value is
      # set directly in the Render dashboard (the Neon connection string).
      - key: DATABASE_URL
        sync: false
    autoDeploy: true
    healthCheckPath: "/healthz/"
