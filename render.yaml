services:
  - type: web
    name: inventory-hub
    env: python
    region: oregon
    plan: free
    branch: main
    rootDir: inventory_management
    buildCommand: >
      pip install -r ../requirements.txt &&
      python manage.py collectstatic --noinput &&
      python manage.py migrate &&
      python manage.py ensure_admin
    startCommand: gunicorn inventory_management.wsgi --bind 0.0.0.0:$PORT --log-file -
    envVars:
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: "inventory-hub.onrender.com"
      - key: DJANGO_SECRET_KEY
        sync: false
      # Brevo sends over HTTPS, not SMTP, so it isn't blocked by Render's
      # free-tier SMTP-port restriction (see EMAIL_BACKEND in settings.py).
      - key: ANYMAIL_BREVO_API_KEY
        sync: false
      # Must be a sender verified in your Brevo account, or sends will fail.
      - key: DEFAULT_FROM_EMAIL
        sync: false
      - key: DJANGO_SUPERUSER_USERNAME
        sync: false
      - key: DJANGO_SUPERUSER_EMAIL
        sync: false
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false
      # Points at a Neon Postgres database instead of a Render-managed one -
      # Render's own free Postgres was timing out on external connections,
      # blocking createsuperuser from outside Render's network. Value is
      # set directly in the Render dashboard (the Neon connection string).
      - key: DATABASE_URL
        sync: false
    autoDeploy: true
    healthCheckPath: "/healthz/"
