services:
  - type: web
    name: inventory-management
    env: python
    region: oregon
    plan: free
    branch: main
    rootDir: inventory_management
    buildCommand: >
      pip install -r ../requirements.txt &&
      python manage.py collectstatic --noinput &&
      python manage.py migrate
    startCommand: gunicorn inventory_management.wsgi --log-file -
    envVars:
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: "inventory-management.onrender.com"
      - key: DJANGO_SECRET_KEY
        sync: false
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-management-db
          property: connectionString
    autoDeploy: true
    healthCheckPath: "/"

# Managed PostgreSQL database - DATABASE_URL is wired into the web service
# above via fromDatabase, so schema changes actually land on Postgres
# instead of silently falling back to a throwaway local SQLite file.
databases:
  - name: inventory-management-db
    postgresMajorVersion: "15"
    region: oregon
    plan: free
