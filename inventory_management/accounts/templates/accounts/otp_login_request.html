<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ role_label }} Login</title>
    <style>
        body {
            background: #f2f2f2;
            font-family: 'Poppins', sans-serif;
            display: flex;
            height: 100vh;
            justify-content: center;
            align-items: center;
            margin: 0;
        }

        .login-container {
            background: #ffffff;
            padding: 40px 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 15px rgba(0, 0, 0, 0.1);
            width: 350px;
        }

        .login-container h2 {
            text-align: center;
            margin-bottom: 10px;
            color: #333;
        }

        .login-container p.subtitle {
            text-align: center;
            color: #777;
            margin-bottom: 25px;
            font-size: 14px;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        input, button {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            outline: none;
            font-size: 16px;
            box-sizing: border-box;
            transition: border 0.3s;
        }

        input:focus {
            border-color: #007bff;
        }

        button {
            background-color: #007bff;
            color: white;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #0056b3;
        }

        .errorlist { color: #dc2626; font-size: 13px; margin: -10px 0 10px; padding-left: 18px; }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>Welcome, {{ role_label }}</h2>
        <p class="subtitle">Enter your email — we'll send you a one-time code to log in or sign up.</p>
        <form method="POST">
            {% csrf_token %}
            {{ form.email }}
            {{ form.email.errors }}
            <button type="submit">Send Code</button>

            <p style="margin-top:10px; text-align: center;">
                <a href="{% url alt_role|add:'_login_request' %}">Login as {{ alt_role|title }}</a>
            </p>
            <p style="margin-top:4px; text-align: center;">
                <a href="{% url 'admin-login' %}">Login as Admin</a>
            </p>
        </form>
    </div>

</body>
</html>
