{% extends 'accounts/admin_base.html' %}
{% block title %}Delete {{ group_by|title }}{% endblock %}

{% block content %}
<div class="confirm-card">
    <div class="confirm-icon"><i class="fas fa-triangle-exclamation"></i></div>
    <h2>Delete {{ group_by|title }}</h2>
    <p>Are you sure you want to delete <strong>{{ group.name }}</strong>? This cannot be undone.</p>
    <form method="post" class="confirm-actions">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger"><i class="fas fa-trash"></i> Delete</button>
        <a href="{% url 'manage_group' group_by %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
