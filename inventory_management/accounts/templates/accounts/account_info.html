<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Info</title>
    <style>
        :root {
            {% include 'accounts/partials/design_tokens.html' %}
        }

        body {
            background: #f2f2f2;
            font-family: 'Inter', 'Segoe UI', Roboto, Arial, sans-serif;
            display: flex;
            height: 100vh;
            justify-content: center;
            align-items: center;
            margin: 0;
        }

        .login-container {
            background: #ffffff;
            padding: 40px 30px;
            border-radius: var(--radius-md);
            box-shadow: 0px 0px 15px rgba(0, 0, 0, 0.1);
            width: 380px;
            max-width: 90vw;
        }

        .login-container h2 {
            text-align: center;
            margin-bottom: 10px;
            color: #333;
        }

        .login-container p.subtitle {
            text-align: center;
            color: #777;
            margin-bottom: 25px;
            font-size: 14px;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 13px;
            font-weight: 600;
            color: #334155;
            margin-bottom: 6px;
        }

        input, textarea, button {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: var(--radius-sm);
            outline: none;
            font-size: 16px;
            box-sizing: border-box;
            font-family: inherit;
            transition: border 0.3s;
        }

        input:focus, textarea:focus {
            border-color: var(--accent);
        }

        input:disabled {
            background: #f1f5f9;
            color: var(--text-muted);
        }

        button {
            background-color: var(--accent);
            color: white;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #0056b3;
        }

        .errorlist { color: var(--danger); font-size: 13px; margin: -10px 0 10px; padding-left: 18px; }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>My Info</h2>
        <p class="subtitle">Manage your {{ role_label }} account details.</p>
        <form method="POST">
            {% csrf_token %}
            <label for="{{ form.full_name.id_for_label }}">Full Name</label>
            {{ form.full_name }}
            {{ form.full_name.errors }}
            <label>Email</label>
            <input type="email" value="{{ email }}" disabled>
            <label for="{{ form.address.id_for_label }}">Address</label>
            {{ form.address }}
            {{ form.address.errors }}
            <button type="submit">Save Changes</button>
        </form>
    </div>

</body>
</html>
