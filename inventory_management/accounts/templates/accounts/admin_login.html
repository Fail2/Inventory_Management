<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { {% include 'accounts/partials/design_tokens.html' %} }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #111827 0%, #1f2937 60%, var(--accent) 140%);
            padding: 20px;
        }

        .login-card {
            width: 100%;
            max-width: 380px;
            background: white;
            border-radius: var(--radius-lg);
            box-shadow: 0 25px 60px rgba(15, 23, 42, 0.35);
            padding: 32px 30px;
        }

        .brand {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-bottom: 24px;
        }

        .brand-icon {
            width: 52px;
            height: 52px;
            border-radius: var(--radius-lg);
            background: linear-gradient(135deg, var(--accent), var(--purple));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 22px;
            box-shadow: 0 10px 24px rgba(37, 99, 235, 0.3);
        }

        .brand-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
        }

        .brand-subtitle {
            font-size: 13px;
            color: var(--text-muted);
        }

        .field-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 16px;
        }

        .field-group label {
            font-size: 13px;
            font-weight: 600;
            color: #334155;
        }

        .field-group input {
            padding: 11px 14px;
            border: 1px solid #d1d5db;
            border-radius: var(--radius-md);
            font-size: 14px;
            font-family: inherit;
        }

        .field-group input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: var(--radius-md);
            background: linear-gradient(135deg, var(--accent), var(--purple));
            color: white;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 6px;
            transition: filter 0.15s ease;
        }

        .login-btn:hover {
            filter: brightness(0.95);
        }

        .alt-link {
            display: block;
            text-align: center;
            margin-top: 18px;
            font-size: 13px;
            color: var(--text-muted);
            text-decoration: none;
        }

        .alt-link:hover {
            color: var(--accent);
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="brand">
            <div class="brand-icon"><i class="fas fa-boxes-stacked"></i></div>
            <div class="brand-title">Inventory Admin</div>
            <div class="brand-subtitle">Sign in to manage your store</div>
        </div>

        <form method="POST">
            {% csrf_token %}
            <div class="field-group">
                <label for="id_username">Username</label>
                <input type="text" id="id_username" name="username" placeholder="admin" required autofocus>
            </div>
            <div class="field-group">
                <label for="id_password">Password</label>
                <input type="password" id="id_password" name="password" placeholder="1234" required>
            </div>
            <button type="submit" class="login-btn"><i class="fas fa-right-to-bracket"></i> Login</button>
        </form>

        <a href="{% url 'login' %}" class="alt-link">Login as Buyer/Supplier instead</a>
    </div>

    {% include 'accounts/partials/messages.html' %}

</body>
</html>
