<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Verify Code</title>
    <style>
        :root { {% include 'accounts/partials/design_tokens.html' %} }

        body {
            background: #f2f2f2;
            font-family: 'Inter', 'Segoe UI', Roboto, Arial, sans-serif;
            display: flex;
            height: 100vh;
            justify-content: center;
            align-items: center;
            margin: 0;
        }

        .login-container {
            background: #ffffff;
            padding: 40px 30px;
            border-radius: var(--radius-md);
            box-shadow: 0px 0px 15px rgba(0, 0, 0, 0.1);
            width: 350px;
            max-width: 90vw;
        }

        .login-container h2 {
            text-align: center;
            margin-bottom: 10px;
            color: #333;
        }

        .login-container p.subtitle {
            text-align: center;
            color: #777;
            margin-bottom: 25px;
            font-size: 14px;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        input, button {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: var(--radius-sm);
            outline: none;
            font-size: 16px;
            box-sizing: border-box;
            text-align: center;
            letter-spacing: 4px;
            transition: border 0.3s;
        }

        input:focus {
            border-color: var(--accent);
        }

        button {
            background-color: var(--accent);
            color: white;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: background-color 0.3s;
            letter-spacing: normal;
        }

        button:hover {
            background-color: #0056b3;
        }

        .errorlist { color: var(--danger); font-size: 13px; margin: -10px 0 10px; padding-left: 18px; }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>Enter Code</h2>
        <p class="subtitle">We sent a 6-digit code to <strong>{{ email }}</strong>. It expires shortly.</p>
        <form method="POST">
            {% csrf_token %}
            {{ form.code }}
            {{ form.code.errors }}
            <button type="submit">Verify</button>

            <p style="margin-top:10px; text-align: center;">
                <a href="{% url role|add:'_login_request' %}">Use a different email / resend code</a>
            </p>
        </form>
    </div>

</body>
</html>
