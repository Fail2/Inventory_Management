<!DOCTYPE html>
<html>
<head>
    <title>Welcome Email</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #f9f9f9; padding: 20px;">
    <div style="max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 8px;">
        <h2 style="color: #4CAF50;">Welcome, {{ user.full_name }}!</h2>
        <p>Thank you for joining our Inventory Management System.</p>
        <p>You can log in anytime using your email address — we'll send a one-time verification code to <strong>{{ user.email }}</strong>, no password needed.</p>

        <p style="text-align: center;">
            <a href="{{ login_url }}" style="padding: 10px 20px; background-color: #4CAF50; color: white; text-decoration: none; border-radius: 5px;">
                Login to Your Account
            </a>
        </p>

        <p>Best Regards,<br>Inventory Management Team</p>
    </div>
</body>
</html>
