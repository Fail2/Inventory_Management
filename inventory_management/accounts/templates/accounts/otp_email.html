<!DOCTYPE html>
<html>
<head>
    <title>Your Verification Code</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #f9f9f9; padding: 20px;">
    <div style="max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 8px;">
        <h2 style="color: #2563eb;">Your Verification Code</h2>
        <p>Use the code below to log in or complete your sign-up:</p>
        <p style="text-align: center; font-size: 32px; font-weight: bold; letter-spacing: 8px; color: #111827; margin: 24px 0;">
            {{ code }}
        </p>
        <p>This code expires in {{ expiry_minutes }} minutes. If you didn't request this, you can safely ignore this email.</p>
        <p style="margin-top: 20px;">Best Regards,<br>Inventory Management Team</p>
    </div>
</body>
</html>
