{% extends 'accounts/admin_base.html' %}
{% block title %}Delete {{ user_type|capfirst }}{% endblock %}

{% block content %}
<div class="confirm-card">
    <div class="confirm-icon"><i class="fas fa-triangle-exclamation"></i></div>
    <h2>Delete {{ user_type|capfirst }}</h2>
    <p>Are you sure you want to delete <strong>{{ user.full_name }}</strong>? This cannot be undone.</p>

    <form method="POST" class="confirm-actions">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger"><i class="fas fa-trash"></i> Yes, Delete</button>
        <a href="{% url 'user_list' user_type %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
