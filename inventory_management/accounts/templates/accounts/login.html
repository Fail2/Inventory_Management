<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <style>
        body {
            background: #f2f2f2;
            font-family: 'Poppins', sans-serif;
            display: flex;
            height: 100vh;
            justify-content: center;
            align-items: center;
            margin: 0;
        }

        .login-container {
            background: #ffffff;
            padding: 40px 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 15px rgba(0, 0, 0, 0.1);
            width: 350px;
            max-width: 90vw;
        }

        .login-container h2 {
            text-align: center;
            margin-bottom: 10px;
            color: #333;
        }

        .login-container p.subtitle {
            text-align: center;
            color: #777;
            margin-bottom: 25px;
            font-size: 14px;
        }

        a.btn {
            display: block;
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 15px;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            text-decoration: none;
            text-align: center;
            box-sizing: border-box;
            transition: background-color 0.3s;
        }

        a.btn-primary {
            background-color: #007bff;
            color: white;
        }

        a.btn-primary:hover {
            background-color: #0056b3;
        }

        a.btn-secondary {
            background-color: #f1f5f9;
            color: #0f172a;
        }

        a.btn-secondary:hover {
            background-color: #e2e8f0;
        }

        p.admin-link {
            margin-top: 4px;
            text-align: center;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>Welcome</h2>
        <p class="subtitle">Continue as a buyer or a supplier — we'll email you a one-time code, no password needed.</p>

        <a class="btn btn-primary" href="{% url 'buyer_login_request' %}">Continue as Buyer</a>
        <a class="btn btn-secondary" href="{% url 'supplier_login_request' %}">Continue as Supplier</a>

        <p class="admin-link">
            <a href="{% url 'admin-login' %}">Login as Admin</a>
        </p>
    </div>

</body>
</html>
